<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>商品選定｜おうちベース</title>
<style>
  :root{ --orange:#f5a623; --green:#2e9b57; --red:#e0524e; --ink:#23204a; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ font-family:-apple-system,"Hiragino Sans",sans-serif; margin:0; background:#f6f6f8;
        color:#222; overflow:hidden; height:100vh; }
  header{ background:var(--orange); color:#fff; padding:13px 16px; display:flex;
          align-items:center; justify-content:space-between; }
  header h1{ font-size:16px; margin:0; }
  header a{ color:#fff; font-size:13px; text-decoration:underline; }
  .stage{ position:relative; height:calc(100vh - 200px); margin:14px auto 0; max-width:460px; }
  .card{ position:absolute; inset:0; background:#fff; border-radius:18px; overflow:hidden;
         box-shadow:0 6px 20px rgba(0,0,0,.12); display:flex; flex-direction:column;
         will-change:transform; touch-action:none; }
  .card img{ width:100%; flex:1; object-fit:contain; background:#faf7f0; min-height:0; padding:10px; }
  .card .info{ padding:12px 16px 16px; }
  .card .price{ font-size:20px; font-weight:bold; color:var(--ink); }
  .card .price small{ font-size:12px; color:#888; font-weight:normal; }
  .card .title{ font-size:13.5px; line-height:1.5; margin-top:6px; max-height:4.5em; overflow:hidden; }
  .stamp{ position:absolute; top:24px; font-size:30px; font-weight:900; padding:6px 14px;
          border:4px solid; border-radius:10px; opacity:0; transform:rotate(-18deg); }
  .stamp.like{ left:18px; color:var(--green); border-color:var(--green); }
  .stamp.nope{ right:18px; color:var(--red); border-color:var(--red); transform:rotate(18deg); }
  .controls{ display:flex; justify-content:center; gap:22px; margin-top:16px; }
  .btn{ width:64px; height:64px; border-radius:50%; border:none; font-size:26px; color:#fff;
        box-shadow:0 4px 12px rgba(0,0,0,.18); }
  .btn.no{ background:var(--red); } .btn.info{ background:#7a7a90; width:52px; height:52px; font-size:20px; align-self:center; }
  .btn.yes{ background:var(--green); }
  .count{ text-align:center; color:#999; font-size:12px; margin-top:10px; }
  .empty{ text-align:center; color:#888; padding:60px 20px; }
  .empty .big{ font-size:40px; }
  /* 詳細モーダル */
  .modal{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none;
          align-items:flex-end; z-index:20; }
  .modal.on{ display:flex; }
  .sheet{ background:#fff; width:100%; max-height:86vh; overflow:auto; border-radius:16px 16px 0 0;
          padding:18px 18px calc(18px + env(safe-area-inset-bottom)); }
  .sheet img{ width:100%; max-height:300px; object-fit:contain; }
  .sheet .price{ font-size:22px; font-weight:bold; }
  .sheet a.amz{ display:block; text-align:center; background:var(--orange); color:#111;
                font-weight:bold; text-decoration:none; padding:13px; border-radius:10px; margin-top:14px; }
  .sheet .close{ float:right; font-size:22px; color:#888; text-decoration:none; }
</style>
</head>
<body>
<header>
  <h1>🛍 商品選定（スワイプ）</h1>
  <a href="/review">記事承認 →</a>
</header>

{% if disabled %}
  <div class="empty">承認画面は無効です（<b>REVIEW_PASSWORD</b> 未設定）。</div>
{% elif not configured %}
  <div class="empty">候補プールが未設定です。<br><code>CANDIDATES_WEBHOOK_URL</code> を設定してください（docs/candidates.md）。</div>
{% else %}
  <div class="stage" id="stage"></div>
  <div class="controls" id="controls">
    <button class="btn no" id="bNo" title="却下">✕</button>
    <button class="btn info" id="bInfo" title="詳細">ⓘ</button>
    <button class="btn yes" id="bYes" title="承認">♥</button>
  </div>
  <div class="count" id="count"></div>
{% endif %}

<div class="modal" id="modal">
  <div class="sheet" id="sheet"></div>
</div>

<script>
  var ITEMS = {{ items | tojson }};
  var idx = 0;
  var stage = document.getElementById('stage');
  var modal = document.getElementById('modal');

  function yen(p){ return (p===null||p===undefined||p==='') ? '価格情報なし'
    : '¥' + Number(p).toLocaleString('ja-JP'); }

  function render(){
    if(!stage) return;
    stage.innerHTML = '';
    var remain = ITEMS.slice(idx, idx+3).reverse();  // 後ろから重ねる
    if(remain.length === 0){
      stage.innerHTML = '<div class="empty"><div class="big">🎉</div>候補をすべて確認しました</div>';
      document.getElementById('controls').style.display = 'none';
    }
    remain.forEach(function(it, i){
      var top = (i === remain.length-1);
      var c = document.createElement('div');
      c.className = 'card';
      c.style.transform = 'scale(' + (1 - (remain.length-1-i)*0.04) + ') translateY(' + ((remain.length-1-i)*-8) + 'px)';
      c.innerHTML =
        '<div class="stamp like">承認</div><div class="stamp nope">却下</div>' +
        '<img src="' + (it.image||'') + '" alt="">' +
        '<div class="info"><div class="price">' + yen(it.price) +
        ' <small>'+(it.asin||'')+'</small></div><div class="title">' +
        (it.title||'').replace(/</g,'&lt;') + '</div></div>';
      stage.appendChild(c);
      if(top) attachDrag(c, it);
    });
    var cnt = document.getElementById('count');
    if(cnt) cnt.textContent = (ITEMS.length - idx) > 0 ? ('残り ' + (ITEMS.length - idx) + ' 件') : '';
  }

  function decide(it, approve, dir){
    fetch('/select/' + it.asin + '/' + (approve?'approve':'reject'), {method:'POST'})
      .catch(function(){});
    idx++;
    setTimeout(render, 180);
  }

  function attachDrag(card, it){
    var sx=0, sy=0, dx=0, dy=0, drag=false;
    var like=card.querySelector('.like'), nope=card.querySelector('.nope');
    function down(e){ drag=true; var p=pt(e); sx=p.x; sy=p.y; card.style.transition='none'; }
    function move(e){ if(!drag) return; var p=pt(e); dx=p.x-sx; dy=p.y-sy;
      card.style.transform='translate('+dx+'px,'+dy+'px) rotate('+(dx/18)+'deg)';
      like.style.opacity = dx>0 ? Math.min(dx/100,1) : 0;
      nope.style.opacity = dx<0 ? Math.min(-dx/100,1) : 0; }
    function up(){ if(!drag) return; drag=false; card.style.transition='transform .3s';
      if(Math.abs(dx)>110){ var ap=dx>0;
        card.style.transform='translate('+(ap?600:-600)+'px,'+dy+'px) rotate('+(ap?40:-40)+'deg)';
        decide(it, ap, ap?'r':'l');
      } else { card.style.transform=''; like.style.opacity=0; nope.style.opacity=0; } }
    function pt(e){ return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY}
                                     : {x:e.clientX,y:e.clientY}; }
    card.addEventListener('mousedown',down); card.addEventListener('touchstart',down,{passive:true});
    window.addEventListener('mousemove',move); window.addEventListener('touchmove',move,{passive:true});
    window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
  }

  function openDetail(){
    var it = ITEMS[idx]; if(!it) return;
    document.getElementById('sheet').innerHTML =
      '<a class="close" href="#" onclick="closeDetail();return false;">✕</a>' +
      '<img src="'+(it.image||'')+'">' +
      '<div class="price" style="margin-top:8px;">'+yen(it.price)+'</div>' +
      '<div style="font-size:14px;line-height:1.7;margin-top:8px;">'+(it.title||'').replace(/</g,'&lt;')+'</div>' +
      '<a class="amz" href="'+it.url+'" target="_blank" rel="nofollow noopener">Amazonで見る ↗</a>';
    modal.classList.add('on');
  }
  function closeDetail(){ modal.classList.remove('on'); }
  modal && modal.addEventListener('click', function(e){ if(e.target===modal) closeDetail(); });

  var bYes=document.getElementById('bYes'), bNo=document.getElementById('bNo'), bInfo=document.getElementById('bInfo');
  bYes && bYes.addEventListener('click', function(){ var it=ITEMS[idx]; if(it) decide(it,true); });
  bNo && bNo.addEventListener('click', function(){ var it=ITEMS[idx]; if(it) decide(it,false); });
  bInfo && bInfo.addEventListener('click', openDetail);

  render();
</script>
</body>
</html>
