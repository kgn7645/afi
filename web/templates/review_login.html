<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ログイン｜記事の承認</title>
<style>
  body{ font-family:-apple-system,"Hiragino Sans",sans-serif; background:#f5a623; margin:0;
        min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box{ background:#fff; border-radius:16px; padding:28px 24px; width:88%; max-width:360px;
        box-shadow:0 8px 24px rgba(0,0,0,.15); text-align:center; }
  h1{ font-size:18px; margin:0 0 4px; }
  p{ color:#777; font-size:13px; margin:0 0 18px; }
  input{ width:100%; padding:14px; font-size:16px; border:1.5px solid #ddd; border-radius:10px;
         margin-bottom:12px; }
  button{ width:100%; padding:14px; font-size:16px; font-weight:bold; color:#fff;
          background:#2e9b57; border:none; border-radius:10px; }
  .err{ color:#d9534f; font-size:13px; margin-bottom:10px; }
</style>
</head>
<body>
  <form class="box" method="post" action="/review/login">
    <h1>📝 記事の承認</h1>
    <p>パスワードを入力してください</p>
    {% if error %}<div class="err">パスワードが違います</div>{% endif %}
    <input type="password" name="password" placeholder="パスワード" autofocus required>
    <button type="submit">ログイン</button>
  </form>
</body>
</html>
