<div style="max-width:680px;margin:4px auto 0;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
  <span style="background:#fff;border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:700;color:#8a86a0;box-shadow:0 1px 4px rgba(40,30,70,.06);">📥 選定待ち <b id="st-pending" style="color:#2b2b3a;">…</b></span>
  <span style="background:#fff;border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:700;color:#8a86a0;box-shadow:0 1px 4px rgba(40,30,70,.06);">✅ 選定済み <b id="st-approved" style="color:#2b2b3a;">…</b></span>
  <span style="background:#fff;border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:700;color:#8a86a0;box-shadow:0 1px 4px rgba(40,30,70,.06);">📝 承認待ち <b id="st-drafts" style="color:#2b2b3a;">…</b></span>
  <span style="background:#fff;border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:700;color:#8a86a0;box-shadow:0 1px 4px rgba(40,30,70,.06);">🚀 本日公開 <b id="st-pub" style="color:#21c17a;">…</b></span>
  <span id="st-queue-chip" style="display:none;background:#fff4d6;border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:700;color:#8a6d1a;box-shadow:0 1px 4px rgba(40,30,70,.06);">⏳ 未反映 <b id="st-queue">0</b></span>
</div>
<script>
(function(){
  fetch('/stats').then(function(r){ return r.json(); }).then(function(d){
    if(!d || !d.ok) return; var s = d.stats || {};
    function set(id,v){ var e=document.getElementById(id); if(e) e.textContent=(v==null?'—':v); }
    set('st-pending', s.pending); set('st-approved', s.approved);
    set('st-drafts', s.drafts); set('st-pub', s.published_today);
    if (s.queue && s.queue > 0) {  // 未反映があれば表示
      set('st-queue', s.queue);
      var q = document.getElementById('st-queue-chip'); if (q) q.style.display = '';
    }
  }).catch(function(){});
})();
</script>
