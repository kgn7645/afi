# ============================================================
# アフィリエイト記事の生成ルール（スプレッドシート解析から抽出）
# プロンプトや判定基準をここで調整できます。
# ============================================================

# --- A作業: 商品選定ルール ---
selection:
  min_price: 3000              # 最低価格（円）。これ未満は除外
  require_in_stock: true       # 在庫ありのみ
  # 除外カテゴリ（消え物・化粧品・薬品）。商品名/カテゴリにこれらを含むと除外
  exclude_keywords:
    - 食品
    - 食べ物
    - 飲み物
    - サプリ
    - 化粧品
    - コスメ
    - 美容液
    - 医薬品
    - 薬
    - スキンケア
  # 優先したい傾向（スコアリング用）。中華系・無名メーカーを優遇
  prefer_minor_maker: true
  # 参考にするリサーチソース（A作業の手動リサーチ用メモ。自動取得はしない）
  research_sources:
    - "Amazon 売れ筋ランキング / 欲しい物ランキング"
    - "マイベスト"
    - "Google トレンド"
    - "Amazonセール速報"
    - "360LIFE"
    - "LDK 暮らしのおすすめベストバイ"
    - "GET NAVI Web"

# --- 記事生成の文体・構成ルール ---
article:
  tone: "親しみやすく、友達とおしゃべりしているような口調。専門用語は噛み砕く。"
  use_tables: false            # 比較は文章で（表は使わない）
  min_chars: 3000              # 本文の目安最低文字数
  # 比較で言及する大手メーカー（カテゴリに応じてAIが選ぶ）
  competitor_brands:
    - パナソニック
    - シャープ
    - アイリスオーヤマ
    - SONY
    - マキタ
    - サンコー
  # 信頼度評価の軸（★5つ星）
  trust_axes:
    - 企業の安定性・規模
    - 製品の品質・技術力
    - 日本市場でのサポート体制
    - 価格競争力

# --- WordPress ---
wordpress:
  category_id: null            # 投稿カテゴリID（null=未指定）
  # SEOプラグインのメタ用キー（Rank Math / Yoast）。使うものに合わせる
  seo_plugin: "rankmath"       # rankmath | yoast | none
