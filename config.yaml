# ============================================================
# アフィリエイト記事の生成ルール（スプレッドシート解析から抽出）
# プロンプトや判定基準をここで調整できます。
# ============================================================

# --- A作業: 商品選定ルール ---
selection:
  min_price: 1500              # 最低価格（円）。これ未満は除外（消耗品開放で引下げ）
  require_in_stock: true       # 在庫ありのみ
  # 除外カテゴリ。医薬品・薬のみ除外（法的リスク最大）。
  # ※化粧品/スキンケア(日焼け止め含む)・食品/飲料・サプリは方針(B)で開放した。
  #   これらは薬機法/食品表示法リスクが高いため、効果効能の断定は prompts の
  #   薬機法ガードレール＋qa.py のNG表現チェックで抑制する（人の承認も必須）。
  exclude_keywords:
    - 医薬品
    - 薬
  # 優先したい傾向（スコアリング用）。中華系・無名メーカーを優遇
  prefer_minor_maker: true
  # 大手・有名メーカーは除外（無名・中華・マイナー優先という選定シート方針 ③）。
  # 商品名/ブランド名にこれらを含む候補はクロール時点で足切りする
  exclude_brands:
    - パナソニック
    - Panasonic
    - シャープ
    - SHARP
    - アイリスオーヤマ
    - ソニー
    - SONY
    - 象印
    - タイガー魔法瓶
    - 山善
    - YAMAZEN
    - ダイソン
    - Dyson
    - Anker
    - アンカー
    - 東芝
    - 日立
    - 三菱電機
    - バルミューダ
    - BALMUDA
    - 無印良品
    - siroca
    - シロカ
    - iRobot
    - アイロボット
    - ニトリ
  # 季節物を優先（選定シート「季節物は優先的に取り上げる」）。今の月の季節
  # キーワードをクロールに自動追加し、該当候補をプールの上位に並べる
  seasonal_boost: true
  # 参考にするリサーチソース（A作業の手動リサーチ用メモ。自動取得はしない）
  research_sources:
    - "Amazon 売れ筋ランキング / 欲しい物ランキング"
    - "マイベスト"
    - "Google トレンド"
    - "Amazonセール速報"
    - "360LIFE"
    - "LDK 暮らしのおすすめベストバイ"
    - "GET NAVI Web"

# --- 記事生成の文体・構成ルール ---
article:
  tone: "親しみやすく、友達とおしゃべりしているような口調。専門用語は噛み砕く。"
  use_tables: false            # 比較は文章で（表は使わない）
  min_chars: 4000              # 本文の目安文字数（6000は水増しの主因だった。密度優先で短縮）
  reviews_each: 5              # 良い/気になる口コミの件数（各）
  ground_company: true         # 企業情報をWeb検索で裏付けてから生成（どこの国の誤生成対策）
  # 比較で言及する大手メーカー（カテゴリに応じてAIが選ぶ）
  competitor_brands:
    - パナソニック
    - シャープ
    - アイリスオーヤマ
    - SONY
    - マキタ
    - サンコー
  # 信頼度評価の軸（★5つ星）
  trust_axes:
    - 企業の安定性・規模
    - 製品の品質・技術力
    - 日本市場でのサポート体制
    - 価格競争力

# --- アフィリエイト（収益導線） ---
affiliate:
  # amazon = Amazon自タグの「Amazonで見る」ボタンを本文複数箇所に（note と統一）
  # moshimo = 従来の楽天検索＋もしもかんたんリンク
  mode: amazon                 # amazon | moshimo
  amazon_button_label: "Amazonで見る"

# --- 商品候補のクロール（Issue #3: スワイプ選定の元データ） ---
candidates:
  per_source: 10               # 1ソースあたり拾う最大ASIN数
  max_total: 40                # 1回のクロールで作る候補の上限
  # 絞り込みキーワード（タイトル一致フィルタ。収集元=ランキング/参照元の結果から
  # 商品名にこれを含むものだけ採用。空白区切りは全語一致。空なら全件）
  keywords:
    - ネッククーラー
    - 卓上扇風機
    - 除湿機 コンパクト
  # 売れ筋ランキングのノード（kitchen/<nodeId> 形式 or フルURL）
  ranking_nodes:
    - kitchen/4083001          # 除湿機
    - "https://www.amazon.co.jp/gp/bestsellers/?ref_=nav_em_cs_bestsellers_0_1_1_2"  # 総合売れ筋
    - "https://www.amazon.co.jp/ranking?tag=googhydr-22&ref=pd_sl_4e56zly8mi_e"      # ランキングハブ
  # 楽天ジャンルID（チェックで選択＝収集元）。楽天は公式API・bot対策無しで安定。
  # 楽天候補はもしも経由で記事化（Amazonカードではなく楽天もしもリンク）。
  rakuten_genres: []
  # 参照元URL（選定シートのリサーチソース）。各ページからAmazonリンク(/dp/ASIN,
  # amzn.to)を抽出して候補化する。マイベスト/360LIFE/LDK/GET NAVI など。
  # ※ページ単体を読むだけ（記事内リンクまでは辿らない）。一覧/記事URLほど有効。
  source_urls:
    - "https://my-best.com/"
    - "https://360life.shinyusha.co.jp/list/amazon-sale"   # Amazonセール速報
    - "https://360life.shinyusha.co.jp/list/ldk"           # LDK ベストバイ
    - "https://360life.shinyusha.co.jp/"
    - "https://getnavi.jp/"
  # Googleトレンド(trends.google.co.jp)はJSアプリでAmazonリンクが無く自動抽出不可。
  # 手動のキーワード発掘に使い、見つけた語は candidates.keywords に追加してください。

# --- プロンプト（Web管理画面/オーバーライドで上書き可能） ---
prompts:
  style_guide: ""              # 空ならコード内デフォルト(STYLE_GUIDE_DEFAULT)を使用
  extra_instructions: ""       # 本文生成に追加する指示（任意）
  # 記事タイトルの型。差し込み語: {brand} {category} {product_name} {model} {year}
  # 空ならコード内デフォルト(DEFAULT_TITLE_FORMAT)を使用。「どこの国？」にしたいなら例:
  #   【{year}】{brand}はどこの国の企業？{category}の評判・口コミを徹底レビュー
  title_format: "【{year}】{brand}の{category}は買い？評判・口コミ・実力を徹底レビュー"

# --- 媒体（複数サイトへの並行量産 / #95） ---
# media[0]=このconfigのトップレベル設定(=おうちベース)を自動で使う。
# 2サイト目以降だけここに追加する（コンセプト/クロール語/カテゴリを媒体別に）。
# WP接続の機密はconfigに書かず env に置く: env_prefix="WP2_" なら
#   WP2_BASE_URL / WP2_USERNAME / WP2_APP_PASSWORD を参照（各ホストの.envに設定）。
# 手順は docs/issue-95-multi-media.md を参照。
media: []
#   - id: gadget            # 媒体ID（英数）。WP投稿先・キュー・統計の識別に使う
#     name: "ガジェット媒体"
#     enabled: false        # 準備できたら true で量産対象に入る
#     kind: wp
#     env_prefix: "WP2_"    # WP2_BASE_URL / WP2_USERNAME / WP2_APP_PASSWORD
#     concept: "在宅×ガジェットで作業効率を上げる道具を、素性まで調べて選ぶメディア"
#     eeat:
#       site_name: "（媒体名）"
#       author_name: "（編集部名）"
#       default_category_slug: "gadget"
#     candidates:
#       keywords: ["モバイルモニター", "左手デバイス"]
#       rakuten_genres: []
#       ranking_nodes: []
#       source_urls: []
#     note_enabled: false

# --- Threads アフィリ（商品選定→投稿作成→承認→キュー→スケジュール公開） ---
threads:
  enabled: false              # true で生成cronが対象。投稿はキュー＋スケジュールで
  gemini_model: ""            # Threads専用モデル（空=全体設定。/threads/ai で変更）
  # pr_prompt / musing_prompt は /threads/ai で編集（空=既定プロンプト）
  accounts:
    - id: mmmtreees           # アカウント識別（投稿先＝THREADS_ACCESS_TOKENのアカウント）
      name: "美容・コスメ"
      persona: "美容好きアラサー女性の等身大。正直レビュー、絵文字多め(✨🥹🥰🔥)。盛れる/血色感/透明感などの美容語彙。薬機法に配慮し効果断定はしない"
      # 美容特化＝キーワードで選定（メイク中心）。空なら既定の美容キーワード
      keywords: ["リップティント", "アイシャドウ パレット", "チーク 頬紅", "マスカラ コスメ", "フェイスパウダー", "化粧下地", "アイブロウ ペンシル", "ハイライター コスメ", "クレンジングバーム", "ヘアオイル 洗い流さない"]
      genres: []               # 美容はキーワード主体。ジャンルID併用も可
      per_run: 3              # 1回の生成で作るPRドラフト数
      musing_per_run: 3        # 1回の生成で作るつぶやき数
  schedule:
    hours: [8, 12, 20]        # 公開する時間帯（分はランダムで人間らしく分散）
    per_run: 1                # publish cron 1回で出す最大数

# --- Gemini モデル（設定画面のドロップダウンで切替・両ホスト即反映） ---
gemini:
  # 使用モデル。空ならenv GEMINI_MODEL→既定。/settings の「AIモデル」で変更可。
  # 候補: gemini-3.1-flash-lite(推奨・最安) / gemini-3-flash-preview /
  #       gemini-3.5-flash(高品質) / gemini-2.5-flash / gemini-2.5-flash-lite(旧)
  model: "gemini-3.1-flash-lite"
  budget_jpy: 5000   # 課金額の目安（AI設定の「概算残」表示用）。実請求はGoogle Cloudが正
  usd_jpy: 150       # 概算コストの円換算レート

# --- 生成バッチの実行ペース（承認→記事化） ---
generation:
  interval_minutes: 20         # 承認済み候補を拾う間隔(分)。cronは5分毎・実間隔はこれで制御
  per_run: 2                   # 1回の実行で生成する記事数

# --- note 同時下書き（任意・非公式API / Issue #2） ---
note:
  enabled: true                # NOTE_SESSION設定時、WP下書きと同時にnote下書きも作成

# --- 内部リンク（Issue #18: 関連記事の相互リンク） ---
internal_links:
  enabled: true
  count: 4                     # 「あわせて読みたい」に出す関連記事の数

# --- 自動QA（Issue #16: 薬機法/誇大・構成・整形の検査） ---
qa:
  enabled: true
  block_publish_on_error: true   # error検出時は公開せず下書きに留める
  # 必要なら ng_keywords / exaggeration_keywords / required_headings を上書き可
  # （未指定時は core/qa.py の既定リストを使用）

# --- SEO（流入施策A） ---
seo:
  structured_data: true        # Product＋Review(★)＋Offer(価格)のJSON-LDを本文に埋込

# --- 比較記事の自動生成（流入B: 「{カテゴリ} おすすめ/比較」狙い） ---
roundup:
  enabled: false               # true で週次cronが比較記事を自動生成
  count: 5                     # 1記事に載せる商品数
  per_run: 1                   # 1日に作る本数（cronは毎日・実際はrefresh_daysで間引く）
  refresh_days: 14            # 同カテゴリの再生成を空ける日数（薄い重複回避）
  status: draft               # draft（承認後公開）推奨
  # 比較記事にするカテゴリ。type: rakuten(genre) / amazon(node)
  categories: []
  #  - {type: rakuten, id: "204546", name: "除湿機"}
  #  - {type: rakuten, id: "208375", name: "扇風機・ネッククーラー"}
  #  - {type: amazon,  node: "kitchen/4083001", name: "除湿機"}

# --- WordPress ---
wordpress:
  category_id: null            # 投稿カテゴリID（null=自動割当に任せる）
  auto_category: true          # 既存カテゴリへ記事を自動割当（未分類を避ける）
  # SEOプラグインのメタ用キー（Rank Math / Yoast）。使うものに合わせる
  seo_plugin: "rankmath"       # rankmath | yoast | none

# --- アイキャッチ画像の自動生成（Issue #5） ---
# 優先順位: Canva(設定時) → Pillow合成 → 商品画像そのまま
eyecatch:
  enabled: true
  style: "bg"                  # bg(背景画像に差込) | amaviser | card
  bg_image: "assets/eyecatch_bg.png"   # bg styleの背景画像（リポジトリ相対）
  bg_text_color: "#3a2a10"     # bg styleの文字色（クリーム地に映える濃色）
  remove_bg: true              # 商品画像の白背景を透明化して背景に馴染ませる
  font_path: ""                # 日本語フォント(.ttf/.ttc)パス。空なら自動探索(mac/Linux)
  amaviser_bg: "#ffffff"       # amaviser風の背景（上）
  amaviser_bg2: "#ece9ff"      # amaviser風の背景（下・淡い紫）
  bg_color: "#0d1b2a"          # card風の背景（上）
  bg_color2: "#16324f"         # card風の背景（下）
  accent_color: "#ff9900"
  text_color: "#ffffff"

# --- 本文への画像差し込み（Issue #90: amaviser風） ---
body_images:
  enabled: true                # 本文に商品実写真ギャラリー＋ブランドバナーを挿入
  max_photos: 3                # レビュー節に差し込む商品実写真の最大枚数（Amazonギャラリー）
  brand_header: true           # 「メーカーの正体」節の前にPillow製ブランドバナーを挿入

# Canva Connect API（任意・有料プラン＋OAuth設定が必要。docs/canva-setup.md）
canva:
  enabled: false               # trueかつ.env/テンプレ設定が揃えばCanvaを優先
  brand_template_id: ""        # CanvaブランドテンプレID
  text_field: "headline"       # テンプレのテキスト差込口名
  image_field: "product"       # テンプレの画像差込口名

# --- E-E-A-T（信頼性の土台） ---
eeat:
  site_name: "おうちベース"
  # サイトの軸（在宅ワーク・おうち時間）。記事のフレーミングにも使う
  site_concept: "在宅ワーク・おうち時間を快適にする道具を、企業の素性や口コミまで調べて選ぶメディア"
  author_name: "おうちベース編集部"     # 運営者名（ハンドルでOK。実名不要・要確認）
  author_bio: "在宅ワークで使えるガジェット・家電を、メーカーの素性や実際の口コミまで調べてレビューしています。"
  profile_slug: "about"               # 運営者情報ページのスラッグ
  # 自動割当に失敗した時の保険カテゴリslug（「未分類(uncategorized)」を避ける）
  default_category_slug: "tools"
